<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Main mesh gradient: blue → purple → pink -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#8A3FD9"/>
      <stop offset="100%" stop-color="#FF375F"/>
    </linearGradient>
    <!-- Top-left highlight -->
    <radialGradient id="hl" cx="0.3" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Sparkle gradient -->
    <linearGradient id="sparkle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.88"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Squircle clip path (macOS rounded square) -->
    <clipPath id="clip">
      <path d="M64,8 C100,8 120,28 120,64 C120,100 100,120 64,120 C28,120 8,100 8,64 C8,28 28,8 64,8 Z"/>
    </clipPath>
  </defs>

  <!-- Squircle background -->
  <g clip-path="url(#clip)">
    <rect width="128" height="128" fill="url(#bg)"/>
    <rect width="128" height="128" fill="url(#hl)"/>
  </g>

  <!-- Subtle inner border -->
  <path d="M64,8 C100,8 120,28 120,64 C120,100 100,120 64,120 C28,120 8,100 8,64 C8,28 28,8 64,8 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>

  <!-- Main sparkle (4-pointed star) -->
  <g transform="translate(64,64)" filter="url(#ds)">
    <!-- Vertical ray -->
    <path d="M 0,-38 C 2,-22 2,-22 4,-12 C 6,-6 8,-4 12,0 C 8,4 6,6 4,12 C 2,22 2,22 0,38 C -2,22 -2,22 -4,12 C -6,6 -8,4 -12,0 C -8,-4 -6,-6 -4,-12 C -2,-22 -2,-22 0,-38 Z"
          fill="url(#sparkle)"/>
    <!-- Horizontal accent -->
    <path d="M 0,-12 C 1,-8 1,-8 2,-4 C 3,-2 4,-1 6,0 C 4,1 3,2 2,4 C 1,8 1,8 0,12 C -1,8 -1,8 -2,4 C -3,2 -4,1 -6,0 C -4,-1 -3,-2 -2,-4 C -1,-8 -1,-8 0,-12 Z"
          fill="url(#sparkle)" opacity="0.6"/>
  </g>

  <!-- Small accent sparkles -->
  <g fill="white" opacity="0.9">
    <!-- Top-right -->
    <path d="M 102,28 C 102.5,30 102.5,30 103,31.5 C 103.5,30 103.5,30 104,28 C 103.5,29 103.5,29 103,30.5 C 102.5,29 102.5,29 102,28 Z" transform="scale(1.5) translate(-30,-7)"/>
    <!-- Bottom-left -->
    <circle cx="36" cy="92" r="2"/>
    <circle cx="36" cy="92" r="3.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
